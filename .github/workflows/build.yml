name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
      - run: flutter --version
      - run: cp -n .env.sample .env || true
      - run: flutter pub get
      - run: keytool -genkey -v -keystore android/app/upload-keystore.jks -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -alias upload -dname "CN=CI,OU=CI,O=CI,L=CI,S=CI,C=CN"
      - run: |
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
